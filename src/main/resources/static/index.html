<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Port tarama</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="kutu">
    <h3 style="color:green">Hedef Gir:</h3>
    <input type="text" id="targetInput" placeholder="örnek: 192.168.1.1:80 veya example.com">
    <br>
    <br>
    <button id="sendBtn">Gönder</button>

    <div id="resultContainer" style="margin-top:12px"></div>

</div>

<script>
(() => {
    const input = document.getElementById('targetInput');
    const btn = document.getElementById('sendBtn');
    const result = document.getElementById('resultContainer');


    const BACKEND_CANDIDATES = ['http://localhost:8080', 'http://127.0.0.1:8080', 'http://localhost:8081'];
    const TIMEOUT_MS = 7000;

    function setLoading(on) {
        btn.disabled = on;
        btn.textContent = on ? 'Çalışıyor...' : 'Gönder';
    }

    function appendLog(line, isError) {
        const p = document.createElement('div');
        p.style.whiteSpace = 'pre-wrap';
        p.style.fontFamily = 'monospace';
        p.style.marginBottom = '6px';
        if (isError) p.style.color = '#a00';
        p.textContent = line;
        result.appendChild(p);
    }

    function clearResult() { result.innerHTML = ''; }

    function makeTimeoutSignal(ms) {
        const ac = new AbortController();
        const id = setTimeout(() => ac.abort(), ms);
        return { signal: ac.signal, clear: () => clearTimeout(id) };
    }

    async function doFetch(url, opts = {}) {
        const t = makeTimeoutSignal(TIMEOUT_MS);
        opts.signal = t.signal;
        try {
            const res = await fetch(url, opts);
            t.clear();
            return res;
        } catch (err) {
            t.clear();
            throw err;
        }
    }

    async function sendToCandidate(baseUrl, target) {
        const postUrl = (baseUrl ? baseUrl.replace(/\/$/, '') : '') + '/scan';
        appendLog('Deneme: ' + (baseUrl || 'same-origin') + ' -> ' + postUrl);

        
        try {
            const res = await doFetch(postUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target })
            });
            return { res, url: postUrl, method: 'POST' };
        } catch (err) {
            appendLog('POST hatası: ' + (err.name === 'AbortError' ? 'timeout' : err.message), true);
        }

        
        try {
            const getUrl = postUrl + '?target=' + encodeURIComponent(target);
            const res = await doFetch(getUrl, { method: 'GET' });
            return { res, url: getUrl, method: 'GET' };
        } catch (err) {
            appendLog('GET hatası: ' + (err.name === 'AbortError' ? 'timeout' : err.message), true);
        }

        return null;
    }

    async function onSend() {
        const target = input.value.trim();
        clearResult();
        if (!target) { appendLog('Lütfen hedef girin.', true); return; }
        setLoading(true);
        appendLog('İstek başlatıldı: ' + target);

        let lastError = null;
        try {
            for (const base of BACKEND_CANDIDATES) {
                const attempt = await sendToCandidate(base, target);
                if (!attempt) { lastError = 'Tüm denemeler başarısız oldu.'; continue; }

                const { res, url, method } = attempt;
                appendLog(method + ' yanıt: ' + res.status + ' ' + res.statusText);

                let bodyText = '';
                let jsonObj = null;
                try {
                    const ct = res.headers.get('content-type') || '';
                    if (ct.includes('application/json')) {
                        jsonObj = await res.json();
                        bodyText = JSON.stringify(jsonObj, null, 2);
                    }
                    else bodyText = await res.text();
                } catch (e) {
                    bodyText = 'Yanıt okunamadı: ' + e.message;
                }

                if (res.ok) {
                    clearResult(); 
                    const header = document.createElement('h4');
                    header.style.color = '#333';
                    header.textContent = 'Sonuç: ' + (jsonObj?.domain || target) + ' (' + (jsonObj?.ip || 'Bilinmiyor') + ')';
                    result.appendChild(header);

                    if (jsonObj && jsonObj.error) {
                        appendLog('Hata: ' + jsonObj.error, true);
                    } else if (jsonObj && jsonObj.ports) {
                        if (jsonObj.ports.length === 0) {
                            appendLog('Belirtilen kritik portların hiçbiri açık bulunamadı.', false);
                        } else {
                            jsonObj.ports.forEach(p => {
                                const div = document.createElement('div');
                                div.style.padding = '8px';
                                div.style.marginBottom = '4px';
                                div.style.backgroundColor = '#e8f5e9';
                                div.style.border = '1px solid #c8e6c9';
                                div.style.borderRadius = '4px';
                                div.innerHTML = `<strong style="color:#2e7d32;">[+] Port ${p.port} AÇIK</strong> | Servis: <span>${p.banner}</span>`;
                                result.appendChild(div);
                            });
                        }
                    } else {
                        
                        const pre = document.createElement('pre');
                        pre.style.whiteSpace = 'pre-wrap';
                        pre.style.background = '#f6fff6';
                        pre.style.padding = '8px';
                        pre.textContent = bodyText;
                        result.appendChild(pre);
                    }
                    setLoading(false);
                    return;
                } else {
                    appendLog('Sunucu hata içeriği:', true);
                    const pre = document.createElement('pre');
                    pre.style.whiteSpace = 'pre-wrap';
                    pre.style.background = '#fff6f6';
                    pre.style.padding = '8px';
                    pre.textContent = bodyText;
                    result.appendChild(pre);
                    lastError = 'Sunucu ' + res.status;
                    
                }
            }

            appendLog('Tüm endpoint denemeleri tamamlandı. Bağlantı sağlanamadı.', true);
            appendLog('Not: Eğer Java backend farklı bir origin (port) üzerinde çalışıyorsa, backend tarafında CORS izni vermeniz gerekir.', true);
        } catch (err) {
            appendLog('Genel hata: ' + err.message, true);
        } finally {
            setLoading(false);
        }
    }

    btn.addEventListener('click', onSend);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') onSend(); });
})();
</script>

</body>
</html>
